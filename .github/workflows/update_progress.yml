name: Update Progress Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'progress/status.json'
      - 'outputs/**'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Update README progress table
        run: python .github/workflows/update_readme.py

      - name: Update dashboard HTML
        run: python .github/workflows/update_dashboard.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md docs/index.html
          git diff --staged --quiet || git commit -m "auto: update progress dashboard"
          git push
